<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D-TV — Canales Argentina</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0a0a0f;
    --surface:   #13131a;
    --card:      #1c1c27;
    --card-hover:#252535;
    --border:    #2a2a3d;
    --accent:    #e63946;
    --accent2:   #ff6b6b;
    --text:      #f0f0f5;
    --muted:     #7a7a9a;
    --pill-bg:   #1e1e2e;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse 80% 50% at 10% 0%, rgba(230,57,70,.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 90% 100%, rgba(100,60,200,.08) 0%, transparent 60%);
    pointer-events: none; z-index: 0;
  }
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,.85); backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px; display: flex; align-items: center; gap: 20px; height: 64px;
  }
  .logo { flex-shrink: 0; }
  .logo img { height: 64px; object-fit: contain; }
  .search-wrap { flex: 1; max-width: 420px; position: relative; }
  .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  #buscar {
    width: 100%; background: var(--card); border: 1px solid var(--border);
    border-radius: 50px; padding: 10px 16px 10px 42px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: .9rem; outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  #buscar:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(230,57,70,.15); }
  #buscar::placeholder { color: var(--muted); }
  .count { margin-left: auto; font-size: .8rem; color: var(--muted); white-space: nowrap; }
  .cats-wrap { position: relative; z-index: 1; padding: 16px 24px 4px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
  .cats-wrap::-webkit-scrollbar { display: none; }
  .cat-pill {
    flex-shrink: 0; padding: 6px 16px; border-radius: 50px;
    background: var(--pill-bg); border: 1px solid var(--border);
    color: var(--muted); font-size: .82rem; font-weight: 500;
    cursor: pointer; transition: all .18s; white-space: nowrap;
  }
  .cat-pill:hover { border-color: var(--accent); color: var(--text); }
  .cat-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 4px 14px rgba(230,57,70,.35); }
  main { position: relative; z-index: 1; padding: 20px 24px 40px; }
  #grilla { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
  .canal-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; transition: transform .2s, box-shadow .2s, border-color .2s;
    animation: fadeIn .3s ease both;
  }
  .canal-card:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 12px 32px rgba(0,0,0,.5); border-color: var(--accent); background: var(--card-hover); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .card-logo { width: 100%; aspect-ratio: 16/9; background: var(--surface); display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; }
  .card-logo img { max-width: 80%; max-height: 80%; object-fit: contain; filter: drop-shadow(0 2px 6px rgba(0,0,0,.4)); }
  .card-logo .fallback-icon { font-size: 2rem; color: var(--muted); }
  .card-body { padding: 10px 12px; }
  .card-nombre { font-size: .82rem; font-weight: 500; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); cursor: pointer; }
  .card-cat { font-size: .72rem; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-btns { display: flex; gap: 6px; margin-top: 8px; }
  .btn-play { flex: 1; padding: 6px; background: var(--accent); border: none; border-radius: 6px; color: #fff; font-size: .75rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background .15s; }
  .btn-play:hover { background: var(--accent2); }
  .btn-vlc { flex: 1; padding: 6px; background: var(--card); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-size: .75rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: border-color .15s, color .15s; }
  .btn-vlc:hover { border-color: var(--accent); color: var(--text); }
  #toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface); border: 1px solid var(--border); border-radius: 50px;
    padding: 10px 24px; font-size: .85rem; color: var(--text);
    opacity: 0; transition: opacity .3s, transform .3s; z-index: 500; pointer-events: none;
    box-shadow: 0 8px 32px rgba(0,0,0,.5); white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #modal { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(5,5,10,.92); backdrop-filter: blur(8px); align-items: center; justify-content: center; padding: 20px; }
  #modal.open { display: flex; }
  .modal-inner { width: 100%; max-width: 860px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; box-shadow: 0 32px 80px rgba(0,0,0,.7); animation: modalIn .22s ease; }
  @keyframes modalIn { from { opacity: 0; transform: scale(.95); } to { opacity: 1; transform: scale(1); } }
  .modal-header { display: flex; align-items: center; gap: 10px; padding: 14px 18px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .modal-nombre { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 1px; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .modal-cat { font-size: .78rem; color: var(--muted); background: var(--card); padding: 3px 10px; border-radius: 50px; border: 1px solid var(--border); }
  #btn-vlc-modal { background: var(--card); border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 6px 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: .85rem; transition: border-color .15s, color .15s; }
  #btn-vlc-modal:hover { border-color: var(--accent); color: var(--text); }
  #btn-cerrar { background: var(--card); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 6px 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: .85rem; transition: background .15s; }
  #btn-cerrar:hover { background: var(--accent); border-color: var(--accent); }
  .video-wrap { position: relative; background: #000; aspect-ratio: 16/9; }
  #player { width: 100%; height: 100%; display: block; }
  .no-video { display: none; position: absolute; inset: 0; align-items: center; justify-content: center; flex-direction: column; gap: 12px; color: var(--muted); font-size: .9rem; text-align: center; padding: 20px; }
  .no-video.show { display: flex; }
  .no-video p { line-height: 1.6; }
  #empty { display: none; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 80px 20px; color: var(--muted); text-align: center; }
  #empty.show { display: flex; }
  #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 100px 20px; color: var(--muted); }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (max-width: 600px) {
    header { padding: 0 14px; height: 56px; gap: 12px; }
    main { padding: 16px 14px 40px; }
    #grilla { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
    .cats-wrap { padding: 12px 14px 4px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo"><img src="D-TV.png" alt="D-TV"></div>
  <div class="search-wrap">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input id="buscar" type="search" placeholder="Buscar canal...">
  </div>
  <span class="count" id="count"></span>
</header>

<div class="cats-wrap" id="cats"></div>

<main>
  <div id="loading"><div class="spinner"></div><span>Cargando canales...</span></div>
  <div id="grilla"></div>
  <div id="empty">
    <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <rect x="2" y="7" width="20" height="15" rx="2"/><path d="M17 2 7 2M12 2v5"/>
    </svg>
    <span>No se encontraron canales</span>
  </div>
</main>

<div id="modal">
  <div class="modal-inner">
    <div class="modal-header">
      <span class="modal-nombre" id="modal-nombre">—</span>
      <span class="modal-cat" id="modal-cat"></span>
      <button id="btn-vlc-modal">📺 Abrir en VLC</button>
      <button id="btn-cerrar">✕ Cerrar</button>
    </div>
    <div class="video-wrap">
      <video id="player" controls autoplay playsinline></video>
      <div class="no-video" id="no-video">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/><path d="m15 9-6 6M9 9l6 6"/>
        </svg>
        <p>Este canal no puede reproducirse en el navegador.<br>Tocá "Abrir en VLC" arriba.</p>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const M3U_URL = 'lista.m3u';
  let todosLosCanales = [];
  let categoriaActiva = 'Todos';
  let canalActual = null;

  function mostrarToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function abrirEnVLC(url, nombre) {
    // Intentar abrir con vlc:// directo
    const a = document.createElement('a');
    a.href = 'vlc://' + url;
    a.click();
    setTimeout(() => {
      mostrarToast('📋 Enlace copiado: ' + url);
      navigator.clipboard.writeText(url).catch(() => {});
    }, 500);
  }

  function parsearM3U(texto) {
    const canales = [];
    const lineas = texto.split('\n');
    for (let i = 0; i < lineas.length; i++) {
      const l = lineas[i].trim();
      if (!l.startsWith('#EXTINF')) continue;
      const nombre = (l.match(/,(.+)$/)               || [])[1]?.trim() || 'Sin nombre';
      const grupo  = (l.match(/group-title="([^"]*)"/) || [])[1]?.trim() || 'General';
      const logo   = (l.match(/tvg-logo="([^"]*)"/)    || [])[1]?.trim() || '';
      let url = '';
      for (let j = i + 1; j < Math.min(i + 4, lineas.length); j++) {
        const c = lineas[j].trim();
        if (c.startsWith('http')) { url = c; break; }
      }
      if (url) canales.push({ nombre, grupo, logo, url });
    }
    return canales;
  }

  function renderCats(canales) {
    const grupos = ['Todos', ...new Set(canales.map(c => c.grupo))];
    const wrap = document.getElementById('cats');
    wrap.innerHTML = '';
    grupos.forEach(g => {
      const pill = document.createElement('button');
      pill.className = 'cat-pill' + (g === 'Todos' ? ' active' : '');
      pill.textContent = g;
      pill.onclick = () => {
        categoriaActiva = g;
        wrap.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
        pill.classList.add('active');
        renderGrilla();
      };
      wrap.appendChild(pill);
    });
  }

  function renderGrilla() {
    const q      = document.getElementById('buscar').value.toLowerCase();
    const grilla = document.getElementById('grilla');
    const empty  = document.getElementById('empty');
    const count  = document.getElementById('count');

    let filtrados = todosLosCanales;
    if (categoriaActiva !== 'Todos') filtrados = filtrados.filter(c => c.grupo === categoriaActiva);
    if (q) filtrados = filtrados.filter(c => c.nombre.toLowerCase().includes(q));

    count.textContent = filtrados.length + ' canales';

    if (!filtrados.length) {
      grilla.innerHTML = '';
      empty.classList.add('show');
      return;
    }
    empty.classList.remove('show');
    grilla.innerHTML = '';

    filtrados.forEach((canal, idx) => {
      const card = document.createElement('div');
      card.className = 'canal-card';
      card.style.animationDelay = Math.min(idx * 20, 400) + 'ms';
      card.innerHTML =
        '<div class="card-logo">' +
          (canal.logo ? '<img src="' + canal.logo + '" alt="' + canal.nombre + '" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\'">' : '') +
          '<span class="fallback-icon" style="' + (canal.logo ? 'display:none' : '') + '">📺</span>' +
        '</div>' +
        '<div class="card-body">' +
          '<div class="card-nombre">' + canal.nombre + '</div>' +
          '<div class="card-cat">' + canal.grupo + '</div>' +
          '<div class="card-btns">' +
            '<button class="btn-play">▶ Ver</button>' +
            '<button class="btn-vlc">📺 VLC</button>' +
          '</div>' +
        '</div>';

      card.querySelector('.card-logo').onclick = () => abrirCanal(canal);
      card.querySelector('.card-nombre').onclick = () => abrirCanal(canal);
      card.querySelector('.btn-play').onclick = () => abrirCanal(canal);
      card.querySelector('.btn-vlc').onclick = () => abrirEnVLC(canal.url, canal.nombre);
      grilla.appendChild(card);
    });
  }

  function abrirCanal(canal) {
    canalActual = canal;
    const modal   = document.getElementById('modal');
    const player  = document.getElementById('player');
    const noVideo = document.getElementById('no-video');

    document.getElementById('modal-nombre').textContent = canal.nombre;
    document.getElementById('modal-cat').textContent    = canal.grupo;
    noVideo.classList.remove('show');
    player.style.display = 'block';
    player.src = canal.url;
    player.load();
    player.onerror = () => {
      player.style.display = 'none';
      noVideo.classList.add('show');
    };
    modal.classList.add('open');
  }

  document.getElementById('btn-vlc-modal').onclick = () => {
    if (canalActual) abrirEnVLC(canalActual.url, canalActual.nombre);
  };

  document.getElementById('btn-cerrar').onclick = () => {
    const player = document.getElementById('player');
    player.pause();
    player.src = '';
    document.getElementById('modal').classList.remove('open');
    canalActual = null;
  };

  document.getElementById('modal').onclick = (e) => {
    if (e.target === document.getElementById('modal'))
      document.getElementById('btn-cerrar').click();
  };

  document.getElementById('buscar').addEventListener('input', renderGrilla);

  async function cargar() {
    try {
      const r = await fetch(M3U_URL + '?t=' + Date.now());
      if (!r.ok) throw new Error('No se pudo cargar la lista');
      const texto = await r.text();
      todosLosCanales = parsearM3U(texto);
      document.getElementById('loading').style.display = 'none';
      renderCats(todosLosCanales);
      renderGrilla();
    } catch (err) {
      document.getElementById('loading').innerHTML =
        '<span style="color:var(--accent)">Error al cargar la lista.<br>' + err.message + '</span>';
    }
  }

  cargar();
</script>
</body>
</html>
